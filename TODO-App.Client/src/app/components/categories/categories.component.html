<div class="container py-4">
  <h1 class="h3 mb-4">{{ 'categories.title' | t }}</h1>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="card mb-4">
    <div class="card-body">
      <h5 class="card-title">{{ 'categories.add' | t }}</h5>
      <div class="input-group">
        <input class="form-control" [(ngModel)]="newCategoryName" [placeholder]="'categories.namePlaceholder' | t" />
        <button class="btn btn-primary" (click)="createCategory()">{{ 'categories.addButton' | t }}</button>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="text-muted">{{ 'categories.loading' | t }}</div>

  <div class="list-group" *ngIf="!loading">
    <div class="list-group-item" *ngFor="let category of categories">
      <div class="d-flex justify-content-between align-items-center gap-3" *ngIf="editingId !== category.id">
        <span>{{ category.name }}</span>
        <div class="btn-group btn-group-sm">
          <button class="btn btn-outline-primary" (click)="startEdit(category)">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-outline-danger" (click)="deleteCategory(category)">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>

      <div class="input-group" *ngIf="editingId === category.id">
        <input class="form-control" [(ngModel)]="editingName" />
        <button class="btn btn-success" (click)="saveEdit(category.id)">{{ 'categories.save' | t }}</button>
        <button class="btn btn-secondary" (click)="cancelEdit()">{{ 'categories.cancel' | t }}</button>
      </div>
    </div>

    <div *ngIf="categories.length === 0" class="list-group-item text-muted">
      {{ 'categories.empty' | t }}
    </div>
  </div>
</div>
